github:
  description: "Apache Incubator Website"
  homepage: "https://incubator.apache.org/"
  labels:
    - incubator
    - website
    - jbake

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: cvs@incubator.apache.org
  pullrequests: cvs@incubator.apache.org
